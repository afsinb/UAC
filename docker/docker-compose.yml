# UAC Sample-App Stack
# Builds each Spring Boot app from source, mounts log directories into the
# host paths that UAC's LocalSystemsMonitorDemo reads from.
#
# Usage:
#   docker compose -f docker/docker-compose.yml up -d --build
#   docker compose -f docker/docker-compose.yml down
#   docker compose -f docker/docker-compose.yml logs -f cache-service

services:

  # ── Payment API (port 8081) ─────────────────────────────────────────────────
  payment-api:
    build:
      context: /tmp/sample-apps/payment-api
      dockerfile: Dockerfile
    container_name: uac-payment-api
    ports:
      - "8081:8081"
    volumes:
      # Logs written inside container to /app/logs/ are readable by UAC on host
      - /tmp/sample-apps/payment-api/logs:/app/logs
    environment:
      - SPRING_PROFILES_ACTIVE=docker
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8081/api/payments/health || exit 1"]
      interval: 30s
      timeout: 10s
      start_period: 40s
      retries: 3

  # ── Cache Service (port 8083) ───────────────────────────────────────────────
  cache-service:
    build:
      context: /tmp/sample-apps/cache-service
      dockerfile: Dockerfile
    container_name: uac-cache-service
    ports:
      - "8083:8083"
    volumes:
      - /tmp/sample-apps/cache-service/logs:/app/logs
    environment:
      - SPRING_PROFILES_ACTIVE=docker
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8083/api/cache/health || exit 1"]
      interval: 30s
      timeout: 10s
      start_period: 40s
      retries: 3

  # ── Worker Service (port 8082) ──────────────────────────────────────────────
  worker-service:
    build:
      context: /tmp/sample-apps/worker-service
      dockerfile: Dockerfile
    container_name: uac-worker-service
    ports:
      - "8082:8082"
    volumes:
      - /tmp/sample-apps/worker-service/logs:/app/logs
    environment:
      - SPRING_PROFILES_ACTIVE=docker
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8082/api/worker/health || exit 1"]
      interval: 30s
      timeout: 10s
      start_period: 40s
      retries: 3

  # ── OpenProject Ticketing (port 8084) ─────────────────────────────────────
  openproject-db:
    image: postgres:14
    container_name: uac-openproject-db
    environment:
      - POSTGRES_DB=openproject
      - POSTGRES_USER=openproject
      - POSTGRES_PASSWORD=openproject
    volumes:
      - openproject-pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U openproject -d openproject"]
      interval: 20s
      timeout: 5s
      retries: 10

  openproject:
    image: openproject/openproject:15
    container_name: uac-openproject
    depends_on:
      openproject-db:
        condition: service_healthy
    ports:
      - "8084:80"
    environment:
      - OPENPROJECT_SECRET_KEY_BASE=${OPENPROJECT_SECRET_KEY_BASE:-uac-openproject-secret-change-me}
      - OPENPROJECT_HOST__NAME=${OPENPROJECT_HOST_NAME:-localhost:8084}
      - OPENPROJECT_HTTPS=${OPENPROJECT_HTTPS:-false}
      - OPENPROJECT_DEFAULT__LANGUAGE=en
      - DATABASE_URL=postgres://openproject:openproject@openproject-db:5432/openproject
    volumes:
      - openproject-assets:/var/openproject/assets
    restart: unless-stopped

volumes:
  openproject-pgdata:
  openproject-assets:

