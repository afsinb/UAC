system:
  name: worker-service
  id: worker-service-local
  environment: development
  description: Background worker with intentional memory leak

monitoring:
  enabled: true
  health_check_interval: 30s
  log_scan_interval: 10s

logs:
  location: /tmp/sample-apps/worker-service/logs/worker-service.log
  format: plain
  patterns:
    error: "ERROR|Exception|OutOfMemory"
    warning: "WARN|Memory"

health_endpoint:
  url: http://localhost:8082/api/worker/health
  interval: 30s

git:
  repository: git@github.com:afsinb/worker-service.git
  branch: main
  token_env: GITHUB_TOKEN

deployment:
  type: docker
  container_name: uac-worker-service
  service_name: worker-service
  compose_file: /Users/afsinbuyuksarac/development/UAC/docker/docker-compose.yml
  restart_command: "docker restart uac-worker-service"

thresholds:
  memory_percent: 80
  processing_time_ms: 1000

recovery:
  enabled: true
  operational_fixes: true
  code_fixes: true
  max_retries: 2

tags:
  - sample
  - worker
  - background-job
  - memory-leak
